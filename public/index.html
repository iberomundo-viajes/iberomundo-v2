 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iberomundo Viajes - Pago Seguro</title>
    <script src="https://js.duffel.com/v2/duffel.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f7f6; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h1 { color: #003366; }
        #card-element { margin: 25px 0; min-height: 40px; }
        #pay-button { background: #003366; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>IBEROMUNDO</h1>
        <p>Finaliza tu reserva de vuelo</p>
        <div id="card-element"></div>
        <button id="pay-button">PAGAR AHORA</button>
    </div>

    <script>
        const duffel = new Duffel();
        async function start() {
            const res = await fetch('/api/create-intent', { method: 'POST' });
            const intent = await res.json();
            const card = duffel.elements.create('card', { clientToken: intent.client_token });
            card.mount('#card-element');

            document.getElementById('pay-button').onclick = async () => {
                try {
                    await duffel.confirmCardPayment(intent.client_token);
                    alert("¡Pago exitoso! Iberomundo confirma tu reserva.");
                } catch (e) { alert("Error: " + e.message); }
            };
        }
        start();
    </script>
</body>
</html>
